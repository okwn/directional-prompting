name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Verify marketplace.json exists and is valid JSON
        run: |
          if [ ! -f .claude-plugin/marketplace.json ]; then
            echo "ERROR: .claude-plugin/marketplace.json not found"
            exit 1
          fi
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "✓ marketplace.json is valid JSON"
          
      - name: Verify plugin structure exists
        run: |
          if [ ! -d plugins/directional-prompting/skills/directional-prompting ]; then
            echo "ERROR: plugins/directional-prompting/skills/directional-prompting not found"
            exit 1
          fi
          echo "✓ Plugin directory structure exists"
          
      - name: Verify SKILL.md exists and is non-empty
        run: |
          if [ ! -f plugins/directional-prompting/skills/directional-prompting/SKILL.md ]; then
            echo "ERROR: SKILL.md not found"
            exit 1
          fi
          if [ ! -s plugins/directional-prompting/skills/directional-prompting/SKILL.md ]; then
            echo "ERROR: SKILL.md is empty"
            exit 1
          fi
          echo "✓ SKILL.md exists and is non-empty"
          
      - name: Verify agent configs are valid YAML
        run: |
          if [ -d plugins/directional-prompting/skills/directional-prompting/agents ]; then
            for yaml in plugins/directional-prompting/skills/directional-prompting/agents/*.yaml; do
              if [ -f "$yaml" ]; then
                python3 -c "import yaml; yaml.safe_load(open('$yaml'))"
                echo "✓ $(basename $yaml) is valid YAML"
              fi
            done
          fi
          
      - name: Verify README.md exists
        run: |
          if [ ! -f README.md ]; then
            echo "ERROR: README.md not found"
            exit 1
          fi
          echo "✓ README.md exists"

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown syntax
        run: |
          for md in $(find . -name "*.md" -type f); do
            # Check file is readable and non-empty
            if [ ! -s "$md" ]; then
              echo "WARNING: $md is empty"
              continue
            fi
            # Basic sanity check - file doesn't have obvious corruption
            if file "$md" | grep -q "text"; then
              echo "✓ $(echo $md | sed 's|^\\./||') is readable text"
            else
              echo "WARNING: $md may not be valid text"
            fi
          done

  typecheck-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml types-PyYAML

      - name: Verify YAML syntax and type checking for agent configs
        run: |
          if [ -d plugins/directional-prompting/skills/directional-prompting/agents ]; then
            for yaml in plugins/directional-prompting/skills/directional-prompting/agents/*.yaml; do
              if [ -f "$yaml" ]; then
                python3 -c "import yaml; yaml.safe_load(open('$yaml'))"
                echo "✓ $(basename $yaml) is valid YAML"
              fi
            done
          fi
          echo "✓ All agent configs pass YAML validation"

  summary:
    runs-on: ubuntu-latest
    needs: [verify-structure, lint-markdown, typecheck-yaml]
    if: always()
    steps:
      - name: Build check complete
        run: |
          echo "## Build Verification Complete"
          echo "All checks passed."